<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Conjure">
  <!-- Magic circle + open 'C' arc. Single-weight stroke, accent color (#4f46e5).
       Geometric, dark-friendly. See brand/BRAND.md "Logo concept". -->
  <rect width="32" height="32" rx="6" fill="#0b0b0f" />
  <g fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round">
    <!-- thin outer magic circle, opened on the right like a C -->
    <path d="M22 8.5A9 9 0 1 0 22 23.5" />
    <!-- inner accent arc / spark -->
    <path d="M19.5 13A4.5 4.5 0 1 0 19.5 19" opacity="0.55" />
  </g>
  <!-- summon spark -->
  <circle cx="22.5" cy="16" r="1.6" fill="#818cf8" />
</svg>
