# PR docs gate — enforces the "docs accompany features" rule (PROJECT_OPERATIONS §9.1).
#
# When a PR touches feature code (packages/conjure/conjure/**) but updates NEITHER the docs
# (apps/docs/**) NOR the changelog, it leaves a friendly warning comment and adds a
# `needs-docs` label. This is a WARNING, never a hard failure — it nudges, it does not block.
#
# CHANGELOG.md is normally generated by release-please, so touching it manually is optional;
# we accept either a docs change or a changelog change as "docs were considered".
#
# No human setup required. The `needs-docs` label is created on the fly if missing.

name: PR docs gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write # add label + comment
  issues: write # labels live on the issues API

concurrency:
  group: pr-docs-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docs-gate:
    name: Remind feature PRs to update docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;
            const LABEL = 'needs-docs';
            const MARKER = '<!-- conjure-docs-gate -->';

            // Collect all changed file paths (handles >100 files via pagination).
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });
            const paths = files.map(f => f.filename);

            const touchesFeatureCode = paths.some(p => p.startsWith('packages/conjure/conjure/'));
            const touchesDocs = paths.some(p => p.startsWith('apps/docs/'));
            const touchesChangelog = paths.some(p => p === 'CHANGELOG.md' || p.endsWith('/CHANGELOG.md'));

            const needsDocs = touchesFeatureCode && !touchesDocs && !touchesChangelog;

            // Find a previous bot comment from this gate (so we update instead of spamming).
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (needsDocs) {
              const body = [
                MARKER,
                '### Docs reminder',
                '',
                'This PR changes feature code under `packages/conjure/conjure/**` but does not update',
                '`apps/docs/**` or `CHANGELOG.md`.',
                '',
                'Per our contribution rule, **feature PRs should ship with docs**. Please either:',
                '',
                '- update the relevant page under `apps/docs/docs/`, or',
                '- explain in the PR why no docs change is needed (refactor, internal-only, etc.).',
                '',
                '_This is a non-blocking reminder. The `needs-docs` label was added; remove it once addressed._',
              ].join('\n');

              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
              }

              // Ensure the label exists, then apply it.
              try {
                await github.rest.issues.getLabel({ owner, repo, name: LABEL });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner, repo, name: LABEL, color: 'fbca04',
                  description: 'Feature PR is missing accompanying docs',
                });
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: [LABEL] });

              core.warning('Feature code changed without a docs or CHANGELOG update — added needs-docs label.');
            } else {
              // Clean up if a prior run flagged this PR but it has since been fixed.
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id,
                  body: `${MARKER}\n### Docs reminder\n\nDocs/CHANGELOG updates detected (or no feature code changed). Thanks! ✅`,
                });
              }
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: pr.number, name: LABEL });
              } catch (e) {
                // Label wasn't present — nothing to remove.
              }
            }
