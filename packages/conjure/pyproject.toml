[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "django-conjure"
version = "0.3.1"
description = "Conjure your Django admin — read your models, summon a CRUD API and dashboard."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Terrace Lab", email = "hello@terracelab.co.kr" }]
keywords = ["django", "admin", "dashboard", "crud", "rest", "codegen", "introspection"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Web Environment",
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Framework :: Django :: 5.0",
    "Framework :: Django :: 5.1",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
dependencies = [
    "Django>=4.2",
    "djangorestframework>=3.15",
]

[project.optional-dependencies]
jwt = ["djangorestframework-simplejwt>=5.3"]
dev = [
    "Django>=4.2",
    "djangorestframework>=3.15",
    "djangorestframework-simplejwt>=5.3",
    "pytest>=8.0",
    "pytest-django>=4.8",
    "ruff>=0.6",
    "build>=1.2",
]

[project.urls]
Homepage = "https://conjure.terracelab.co.kr"
Documentation = "https://docs.conjure.terracelab.co.kr"
Repository = "https://github.com/terracelab/django-conjure"
Changelog = "https://github.com/terracelab/django-conjure/blob/main/CHANGELOG.md"
Issues = "https://github.com/terracelab/django-conjure/issues"

[tool.hatch.build.targets.wheel]
packages = ["conjure"]

[tool.hatch.build.targets.sdist]
include = ["/conjure", "/README.md", "/tests", "/LICENSE"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
# Put the package root on sys.path so `tests.settings` imports under a non-editable
# CI install (`pip install ".[dev]"`), not just an editable `-e` install.
pythonpath = ["."]
python_files = ["test_*.py"]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501"]
"tests/*" = ["DJ"]
